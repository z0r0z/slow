<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 100' fill='none' stroke-linecap='square'%3E%3Crect width='120' height='100' fill='%23000'/%3E%3Cpath stroke='%23fff' d='M35 32h30M23 50h42M43 68h22M75 22l32 28-32 28' stroke-width='10'/%3E%3Cpath stroke='%23fff' d='M15 43l-8 7 8 7' stroke-width='6'/%3E%3C/svg%3E">
<title>SLOW</title>
<style>
:root {
  --bg:#000; --fg:#fff; --bg2:#1a1a1a; --bg3:#333; --bd:#333;
  --eth:#ff69b4; --usdc:#2775ca; --usdt:#26a17b; --bold:#745DDF;
  --t:.3s ease;
}
body.light {
  --bg:#fff; --fg:#000; --bg2:#e6e6e6; --bg3:#ccc; --bd:#ccc;
}
*{box-sizing:border-box;margin:0;padding:0}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:var(--bg);color:var(--fg);font-family:Arial,sans-serif;transition:background var(--t),color var(--t);position:relative;overflow:hidden}
.theme,.wallet{position:absolute;top:20px;background:var(--bg2);color:var(--fg);border:1px solid var(--bd);padding:10px 15px;border-radius:4px;font-size:14px;cursor:pointer;z-index:50;transition:var(--t)}
.theme{left:20px;width:42px;text-align:center;padding:10px 0}
.wallet{right:20px}
.theme:hover,.wallet:hover{background:var(--bg3)}
.frame{display:flex;flex-direction:column;width:200px;border:2px solid var(--fg);overflow:visible;transition:var(--t);user-select:none;position:relative;z-index:1}
body.v-take .frame{z-index:6;border-color:transparent}
body.v-take .divider{visibility:hidden}
body.v-take #takeBox{display:none}
.box{height:100px;display:flex;justify-content:center;align-items:center;font-weight:bold;font-size:24px;cursor:pointer;transition:transform var(--t),background var(--t),color var(--t)}
.box.peek{box-shadow:0 4px 12px rgba(0,0,0,.25)}
body.light .box.peek{box-shadow:0 4px 12px rgba(0,0,0,.15)}
#takeBox.peek,#sendBox.peek{background:var(--bg2);color:var(--fg)}
#takeBox.peek:hover,#sendBox.peek:hover{background:var(--bg3)}
#takeBox.peek{transform:translateY(105px);align-items:flex-end;padding-bottom:15px}
#sendBox.peek{transform:translateY(-105px)}
body.v-take #sendBox.peek{position:fixed;top:50px;left:50%;transform:translateX(-50%);width:auto;height:auto;padding:8px 22px;font-size:14px;border:1px solid var(--bd);border-radius:4px;z-index:8;align-items:center}
body.v-take .take{top:calc(50% + 50px)}
#sendBox{background:var(--fg);color:var(--bg)}
#takeBox{background:var(--bg);color:var(--fg)}
#sendBox.on{background:var(--bg);color:var(--fg)}
#takeBox.on{background:var(--fg);color:var(--bg)}
.divider{height:2px;background:var(--fg)}
.crypto-grid{display:none;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:10px;width:300px;height:300px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5}
.crypto-grid.on{display:grid}
.crypto{display:flex;justify-content:center;align-items:center;font-weight:bold;font-size:24px;color:#fff;cursor:pointer;border:2px solid transparent;transition:var(--t);padding:15px}
.crypto.sel{border:4px solid var(--fg);box-shadow:0 0 10px rgba(128,128,128,.6)}
[data-symbol=ETH]{background:var(--eth)}
[data-symbol=USDC]{background:var(--usdc)}
[data-symbol=USDT]{background:var(--usdt)}
[data-symbol=BOLD]{background:var(--bold)}
.row{display:none;position:absolute;left:50%;transform:translateX(-50%);gap:10px;z-index:6}
.row.on{display:flex}
#amountRow{top:40px}
#timeRow{bottom:40px}
.opt{font-weight:bold;font-size:18px;color:var(--fg);background:var(--bg2);cursor:pointer;border:1px solid var(--bd);padding:15px 20px;min-width:80px;text-align:center;transition:var(--t);user-select:none}
.opt:hover{background:var(--bg3)}
.opt.sel{background:var(--bg3);border:2px solid var(--fg);box-shadow:0 0 10px rgba(128,128,128,.4)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);justify-content:center;align-items:center;z-index:25}
body.light .modal{background:rgba(0,0,0,.5)}
.modal.on{display:flex}
.card{background:var(--bg);border:2px solid var(--fg);color:var(--fg);padding:30px;width:min(350px,calc(100vw - 32px));text-align:center;border-radius:6px}
.card h3{margin-bottom:15px}
.summary{font-size:24px;font-weight:bold;margin-bottom:30px}
.input{width:100%;background:var(--bg2);color:var(--fg);border:1px solid var(--bd);padding:12px;font-size:16px;border-radius:4px;text-align:center;margin-bottom:20px}
.input:focus{outline:none;border-color:var(--fg)}
.btn{background:var(--fg);color:var(--bg);border:none;padding:12px 30px;font-size:18px;font-weight:bold;cursor:pointer;border-radius:4px;transition:var(--t);width:100%}
.btn:hover{filter:brightness(.9)}
.btn:disabled{opacity:.5;cursor:not-allowed;filter:none}
.ens{font-size:14px;text-align:left;height:20px;margin-bottom:10px}
.ens.ok{color:#4caf50}
.ens.err{color:#ff6b6b}
.tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:0 0 20px}
.tgrid div{display:flex;flex-direction:column;align-items:center}
.tgrid input{width:100%;background:var(--bg2);color:var(--fg);border:1px solid var(--bd);padding:10px;text-align:center;font-size:18px;border-radius:4px}
.tgrid label{font-size:13px;margin-top:5px}
.take{display:none;flex-direction:column;width:80vw;max-width:800px;max-height:70vh;overflow-y:auto;gap:24px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;padding-right:6px;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
.take::-webkit-scrollbar{width:8px}
.take::-webkit-scrollbar-track{background:transparent}
.take::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}
.take::-webkit-scrollbar-thumb:hover{background:var(--bd)}
.take.on{display:flex}
.tabs{display:none;position:absolute;top:20px;left:50%;transform:translateX(-50%);z-index:7;gap:8px}
.tabs.on{display:flex}
.tab{padding:8px 15px;background:var(--bg2);color:var(--fg);border:1px solid var(--bd);cursor:pointer;border-radius:4px;font-size:14px;transition:var(--t)}
.tab.on{background:var(--bg3);border-color:var(--fg)}
.tab:hover:not(.on){filter:brightness(1.1)}
.empty{text-align:center;padding:50px;color:#888}
.line-wrap{position:relative;height:36px;flex-shrink:0}
.line{height:36px;border-radius:18px;overflow:hidden;position:relative;display:flex;align-items:center}
.line[data-sym=ETH]{background:var(--eth)}
.line[data-sym=USDC]{background:var(--usdc)}
.line[data-sym=USDT]{background:var(--usdt)}
.line[data-sym=BOLD]{background:var(--bold)}
.line[data-sym=other]{background:#888}
.bar{position:absolute;height:100%;background:rgba(0,0,0,.25);z-index:1;transition:width .5s}
body.light .bar{background:rgba(255,255,255,.4)}
.arrow{position:absolute;width:20px;height:20px;display:flex;justify-content:center;align-items:center;color:#fff;font-size:20px;line-height:20px;cursor:pointer;z-index:6;transition:left .5s,transform .2s}
.arrow:hover{transform:scale(1.2);z-index:7}
.arrow.ready,.arrow.recover{background:var(--bg2);border:1px solid var(--bd);border-radius:50%;padding:2px}
.arrow.ready{color:#4caf50;text-shadow:0 0 6px rgba(76,175,80,.5)}
.arrow.recover{color:#ff9800;text-shadow:0 0 6px rgba(255,152,0,.5)}
body.light .arrow.ready{text-shadow:none;color:#2e7d32}
body.light .arrow.recover{text-shadow:none;color:#e65100}
.tip{position:absolute;background:rgba(0,0,0,.85);color:#fff;padding:10px 12px;border-radius:6px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;border:1px solid #333;top:-10px;transform:translateY(-100%);box-shadow:0 2px 8px rgba(0,0,0,.4)}
.arrow.flip .tip{top:auto;bottom:-10px;transform:translateY(100%)}
.arrow.flip-r .tip{left:auto;right:0}
body.light .tip{background:rgba(255,255,255,.95);color:#000;border-color:#ccc}
.arrow:hover .tip{opacity:1}
.tt{display:flex;justify-content:space-between;margin:2px 0;gap:12px}
.tl{font-weight:bold;color:#aaa}
body.light .tl{color:#555}
.label{font-size:14px;font-weight:bold;margin-bottom:4px;flex-shrink:0}
.empty-cta{width:auto;padding:10px 20px;font-size:14px;margin-top:20px}
#approveText{margin:20px 0}
.auto-claim{display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;margin-bottom:8px;cursor:pointer;user-select:none}
.auto-claim input{cursor:pointer;width:16px;height:16px;accent-color:var(--bold)}
.tip-pre{font-size:12px;color:#888;margin-bottom:14px;min-height:16px}
.arrow.tipped{box-shadow:0 0 0 2px var(--bold)}
.opt-link{display:none;position:absolute;left:50%;top:calc(50% - 200px);transform:translateX(-50%);background:transparent;color:var(--fg);font-size:12px;font-weight:normal;cursor:pointer;letter-spacing:.5px;z-index:6;border:1px dashed var(--bd);border-radius:4px;padding:7px 14px;opacity:.5;transition:var(--t)}
.opt-link.on{display:block}
.opt-link:hover{background:var(--bg2);opacity:1;border-style:solid}
.opt-link.sel{opacity:1;color:#fff;border:2px solid var(--fg);font-weight:bold;box-shadow:0 0 10px rgba(128,128,128,.6)}
.crypto-grid.dim .crypto{opacity:.35}
.spinner{width:50px;height:50px;border:5px solid rgba(128,128,128,.3);border-radius:50%;border-top-color:var(--fg);animation:sp 1s ease-in-out infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:30;justify-content:center;align-items:center;flex-direction:column}
.loading.on{display:flex}
.loading p{color:#fff;margin-top:15px;font-size:16px}
body.light .loading{background:rgba(255,255,255,.7)}
body.light .loading p{color:#000}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg2);color:var(--fg);border:1px solid var(--bd);padding:12px 20px;border-radius:4px;font-size:14px;z-index:40;opacity:0;transition:opacity .3s;max-width:80%;text-align:center;pointer-events:none}
.toast.on{opacity:1}
.persona-switch{position:fixed;top:0;left:50%;transform:translateX(-50%);background:var(--bg2);color:var(--fg);border:1px solid var(--bd);border-top:none;border-radius:0 0 6px 6px;padding:8px 16px;font-size:12px;z-index:60;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.persona-switch select{background:transparent;color:var(--fg);border:none;outline:none;font-size:12px;cursor:pointer;font-weight:bold}
.persona-switch label{opacity:.6;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.persona-switch .desc{opacity:.5;font-size:11px;font-style:italic;border-left:1px solid var(--bd);padding-left:10px;max-width:280px}
body.v-take .tabs{top:96px}
@media (max-width:480px){
  .persona-switch{padding:6px 12px;font-size:11px;gap:8px}
  .persona-switch .desc{display:none}
  body.v-take .tabs{top:80px}
}
@media (max-width:480px){
  .frame{width:180px}
  .box{height:90px;font-size:22px}
  .crypto-grid{width:280px;height:280px}
  .crypto{font-size:20px;padding:12px}
  .opt{min-width:60px;padding:12px 14px;font-size:16px}
  #amountRow{top:60px}
  #timeRow{bottom:24px}
  .theme,.wallet{top:12px;padding:8px 12px;font-size:13px}
  .theme{left:12px}
  .wallet{right:12px}
  .card{padding:24px 20px}
  .summary{font-size:20px;margin-bottom:20px}
  .take{width:calc(100vw - 24px);gap:18px}
  .opt-link{top:calc(50% - 180px)}
  #takeBox.peek{transform:translateY(95px);padding-bottom:13px}
  #sendBox.peek{transform:translateY(-95px)}
  body.v-take #sendBox.peek{top:42px;font-size:12px;padding:6px 16px}
  body.v-take .take{top:calc(50% + 40px)}
}
</style>

<script>
(()=>{
'use strict';
const $ = id => document.getElementById(id);
const SLOW = '0x000000000000888741B254d37e1b27128AfEAaBC';
const ZERO = '0x0000000000000000000000000000000000000000';
const MAINNET = '0x1';
const ENS_REG = '0x00000000000C2E074eC69A0dFb2997BA6C7d2e1e';
const WNS = '0x0000000000696760E15f265e828DB644A0c242EB';
const GRACE = 2592000;
const SEL = {
  depositTo:'0x94eeaec9', reverse:'0x97d15425',
  claim:'0x379607f5', clawback:'0xfcc36bc9', unlock:'0x6198e339',
  withdrawFrom:'0xd4fdc309', multicall:'0xac9650d8', pendingTransfers:'0x6577b86a',
  getOut:'0xd40d4bc6', getIn:'0xe3993ee7',
  guardians:'0x0633b14a', isGuardianApprovalNeeded:'0xaade934f', isWithdrawalApprovalNeeded:'0xabe616b8',
  approve:'0x095ea7b3', allowance:'0xdd62ed3e', decimals:'0x313ce567', symbol:'0x95d89b41',
  resolver:'0x0178b8bf', addr:'0x3b3b57de', ensName:'0x691f3431',
  wnsReverse:'0x9af8b7aa',
  depositToWithTip:'0x75f92e42', tips:'0xa5c68c59', refundTip:'0xd27e1e72', gateAddr:'0x7a0ebc88',
};
const M64 = (1n<<64n)-1n;
const RC = [1n,32898n,9223372036854808714n,9223372039002292224n,32907n,2147483649n,9223372039002292353n,9223372036854808585n,138n,136n,2147516425n,2147483658n,2147516555n,9223372036854775947n,9223372036854808713n,9223372036854808579n,9223372036854808578n,9223372036854775936n,32778n,9223372039002259466n,9223372039002292353n,9223372036854808704n,2147483649n,9223372039002292232n];
const ROT = [0,1,62,28,27,36,44,6,55,20,3,10,43,25,39,41,45,15,21,8,18,2,61,56,14];
const rotL = (x,n)=>((x<<n)|(x>>(64n-n)))&M64;
function kF(s){
  for(let r=0;r<24;r++){
    const C=[0n,0n,0n,0n,0n];
    for(let x=0;x<5;x++) C[x]=s[x]^s[x+5]^s[x+10]^s[x+15]^s[x+20];
    const D=[0n,0n,0n,0n,0n];
    for(let x=0;x<5;x++) D[x]=C[(x+4)%5]^rotL(C[(x+1)%5],1n);
    for(let x=0;x<5;x++)for(let y=0;y<5;y++) s[x+5*y]^=D[x];
    const B=new Array(25);
    for(let x=0;x<5;x++)for(let y=0;y<5;y++) B[y+5*((2*x+3*y)%5)]=rotL(s[x+5*y],BigInt(ROT[x+5*y]));
    for(let x=0;x<5;x++)for(let y=0;y<5;y++) s[x+5*y]=(B[x+5*y]^((~B[((x+1)%5)+5*y])&B[((x+2)%5)+5*y]))&M64;
    s[0]^=RC[r];
  }
}
function keccak256(input){
  let bytes;
  if(typeof input==='string'){
    if(input.startsWith('0x')){
      bytes=new Uint8Array((input.length-2)/2);
      for(let i=0;i<bytes.length;i++) bytes[i]=parseInt(input.slice(2+i*2,4+i*2),16);
    } else bytes=new TextEncoder().encode(input);
  } else bytes=input;
  const R=136, s=new Array(25).fill(0n);
  let p=0;
  while(p+R<=bytes.length){
    for(let i=0;i<R;i++){const l=i>>3; s[l]=(s[l]^(BigInt(bytes[p+i])<<BigInt((i&7)*8)))&M64;}
    kF(s); p+=R;
  }
  const buf=new Uint8Array(R);
  for(let i=p;i<bytes.length;i++) buf[i-p]=bytes[i];
  buf[bytes.length-p]=1; buf[R-1]|=0x80;
  for(let i=0;i<R;i++){const l=i>>3; s[l]=(s[l]^(BigInt(buf[i])<<BigInt((i&7)*8)))&M64;}
  kF(s);
  let o='0x';
  for(let i=0;i<32;i++) o+=Number((s[i>>3]>>BigInt((i&7)*8))&0xffn).toString(16).padStart(2,'0');
  return o;
}
const strip = h => h && h.startsWith('0x') ? h.slice(2) : (h||'');
const padL  = h => strip(h).padStart(64,'0');
const padR  = h => { const s=strip(h); return s.padEnd(Math.ceil(s.length/64)*64||64,'0'); };
const word  = v => (typeof v==='bigint'?v:BigInt(v)).toString(16).padStart(64,'0');
const isDyn = t => t==='bytes'||t==='string'||t.endsWith('[]');
const encStatic = (t,v) => t==='address'?padL(v):word(v);
function encBytes(b){const d=strip(b),L=d.length/2; return word(L)+(L?padR(d):'');}
function encBytesArr(arr){
  let h='',t='',c=arr.length*32;
  for(const b of arr){h+=word(c); const e=encBytes(b); t+=e; c+=e.length/2;}
  return word(arr.length)+h+t;
}
const encDyn = (t,v) => t==='bytes[]'?encBytesArr(v):encBytes(v);
function encode(types,values){
  const heads=[],tails=[];

    const fh = await rpc('eth_feeHistory', ['0x5', 'latest', [50]]);
    const baseFee = BigInt(fh.baseFeePerGas.at(-1));
    const lastReward = fh.reward?.at(-1)?.[0];
    const priority = lastReward ? BigInt(lastReward) : 1_000_000_000n;
    const gasUnits = token === ZERO ? 80_000n : 120_000n;
    return gasUnits * (baseFee * 2n + priority) * 3n / 2n;
  } catch(e){
    return 500_000_000_000_000n;
  }

      const k=id.toString(), pt=map.get(k);
      if(!pt || pt.ts===0n) return null;
      const {token,delay} = decodeId(pt.tid);
      const m = S.meta[token.toLowerCase()] || {symbol:'???',decimals:18};
      const timestamp = Number(pt.ts);
      return {
        id:k, from:pt.from, to:pt.to, tokenId:pt.tid.toString(),
        token, symbol:m.symbol,
        amount: parseFloat(formatUnits(pt.amt, m.decimals)),
        amountRaw: pt.amt,
        timestamp, delay, unlockTime: timestamp+delay,
      };
    };
    S.out = oIds.map(build).filter(Boolean).sort((a,b)=>a.unlockTime-b.unlockTime);
    S.inb = iIds.map(build).filter(Boolean).sort((a,b)=>a.unlockTime-b.unlockTime);
    if(hasGuardian && S.out.length){
      const need = await Promise.all(S.out.map(t =>
        sCall(cd(SEL.isWithdrawalApprovalNeeded,
          ['address','address','uint256','uint256'],
          [S.account, S.account, BigInt(t.tokenId), t.amountRaw]))));
      need.forEach((r,i) => { S.out[i].guardianPending = decode(['uint256'], r)[0] !== 0n; });
    }
    const tipList = [...S.inb, ...S.out];
    if(tipList.length){
      const gate = await getGate();
      if(gate){
        const tipR = await Promise.all(tipList.map(t =>
          callOk(gate, cd(SEL.tips, ['uint256'], [BigInt(t.id)]))));
        tipR.forEach((r,i) => {
          if(r){ const [amt] = decode(['uint256'], r); if(amt > 0n) tipList[i].tipped = true; }
        });
      }
    }
  } catch(e){
    toast('Failed to load transfers');
  } finally {
    S.loading=false; renderTransfers();
  }
}
async function deposit(){
  showLoad('Creating time-locked transfer...');
  try {
    const isETH = S.token===ZERO;
    const meta = isETH ? {decimals:18} : await tokenMeta(S.token);
    const wei = parseUnits(S.amount, meta.decimals);
    let data, value;
    if(S.autoClaim){
      S.tip = await estimateTip(S.token);
      data = cd(SEL.depositToWithTip,
        ['address','address','uint256','uint96','uint256','bytes'],
        [isETH?ZERO:S.token, S.resolved, wei, BigInt(S.delay), S.tip, '0x']);
      value = isETH ? wei + S.tip : S.tip;
    } else {
      data = cd(SEL.depositTo,
        ['address','address','uint256','uint96','bytes'],
        [isETH?ZERO:S.token, S.resolved, isETH?0n:wei, BigInt(S.delay), '0x']);
      value = isETH ? wei : 0n;
    }
    const tx = {from:S.account, to:SLOW, data};
    if(value > 0n) tx.value = '0x'+value.toString(16);
    const hash = await sendTx(tx);
    showLoad('Confirming...');
    await waitTx(hash);
    toast('Sent! Funds locked in SLOW.', 5000);
    setView('home');
    loadTransfers();
  } catch(e){
    toast(e.message || 'Transaction failed');
  } finally { hideLoad(); }
}
async function claim(t){
  const now = Date.now()/1000|0;
  if(now < t.unlockTime){ toast(`${fmtTime(t.unlockTime-now)} remaining`); return; }
  showLoad('Claiming...');
  try {
    const data = cd(SEL.claim, ['uint256'], [BigInt(t.id)]);
    const hash = await sendTx({from:S.account, to:SLOW, data});
    showLoad('Confirming...');
    await waitTx(hash);
    toast('Claimed!', 5000);
    loadTransfers();
  } catch(e){ toast(e.message || 'Failed'); }
  finally { hideLoad(); }
}
async function clawback(t){
  const now = Date.now()/1000|0;
  const ready = t.unlockTime + GRACE;
  if(now < ready){ toast(`Recovery ready in ${fmtTime(ready-now)}`); return; }
  showLoad('Recovering...');
  try {
    const cb = cd(SEL.clawback, ['uint256'], [BigInt(t.id)]);
    const w = cd(SEL.withdrawFrom,
      ['address','address','uint256','uint256'],
      [t.from, S.account, BigInt(t.tokenId), t.amountRaw]);
    const data = cd(SEL.multicall, ['bytes[]'], [[cb, w]]);
    const hash = await sendTx({from:S.account, to:SLOW, data});
    showLoad('Confirming...');
    await waitTx(hash);
    toast('Recovered!', 5000);
    loadTransfers();
  } catch(e){ toast(e.message || 'Failed'); }
  finally { hideLoad(); }
}
async function reverseAndWithdraw(t){
  const now = Date.now()/1000|0;
  if(now >= t.unlockTime){ toast("Timelock expired — can't reverse"); return; }
  showLoad('Reversing transfer...');
  try {
    const r = cd(SEL.reverse, ['uint256'], [BigInt(t.id)]);
    const w = cd(SEL.withdrawFrom,
      ['address','address','uint256','uint256'],
      [t.from, S.account, BigInt(t.tokenId), t.amountRaw]);
    const data = cd(SEL.multicall, ['bytes[]'], [[r, w]]);
    const hash = await sendTx({from:S.account, to:SLOW, data});
    showLoad('Confirming...');
    await waitTx(hash);
    toast('Reversed and returned!', 5000);
    loadTransfers();
  } catch(e){ toast(e.message || 'Failed'); }
  finally { hideLoad(); }
}

    if(S.resolving){ toast('Resolving address...'); return; }
    if(!await resolveRecipient(el.recipientInput.value.trim())){ el.recipientInput.focus(); return; }
  }
  if(!S.account){
    toast('Connecting wallet...');
    if(!await connect()) return;
  }
  if(!await ensureMainnet()){ toast('Switch to Ethereum mainnet'); return; }
  hideModal(el.confirmModal);
  try {
    if(S.token!==ZERO){
      const m = await tokenMeta(S.token);
      const wei = parseUnits(S.amount, m.decimals);
      if(!await checkAllowance(S.token, S.account, wei)){
        el.approveText.textContent = `Allow SLOW to use your ${S.symbol}.`;
        showModal(el.approveModal);
        return;
      }

    await deposit();
  } catch(e){
    toast(e.message || 'Failed to start transfer');
  }
}

    ]
  }
};

let mockPersona = 'alice';

connect = async () => {
  const p = PERSONAS[mockPersona];
  S.account = p.address;
  S.ensName = p.name;
  updateWallet();
  return true;
};
disconnect = () => {
  S.account = null; S.ensName = null;
  S.out = []; S.inb = [];
  S.hasGuardian = false;
  setView('home'); updateWallet();
  toast('Disconnected (preview)');
};
loadTransfers = async () => {
  if(!S.account) return;
  const callPersona = mockPersona;
  S.loading = true; renderTransfers();
  await new Promise(r => setTimeout(r, 250));
  if(callPersona !== mockPersona) return;
  const p = PERSONAS[mockPersona];
  S.out = [...p.out];
  S.inb = [...p.inb];
  S.hasGuardian = !!p.hasGuardian;
  S.loading = false; renderTransfers();
};
ensureMainnet = async () => true;
estimateTip = async (token) => (token === TOK_ETH ? 240_000_000_000_000n : 360_000_000_000_000n);
getGate = async () => '0x000000000000aaaaaaaaaaaaaaaaaaaaaaaaaaaa';
const _approved = new Set();
checkAllowance = async (tok) => tok === ZERO || _approved.has(tok.toLowerCase());
tokenMeta = async (addr) => {
  const k = (addr || '').toLowerCase();
  if(k === TOK_ETH) return {symbol:'ETH', decimals:18};
  if(k === TOK_USDC) return {symbol:'USDC', decimals:6};
  if(k === TOK_USDT) return {symbol:'USDT', decimals:6};
  if(k === TOK_BOLD) return {symbol:'BOLD', decimals:18};
  return {symbol:'TKN', decimals:18};
};
resolveRecipient = async (input) => {
  S.resolving = true; el.confirmBtn.disabled = true;
  el.ens.textContent = 'Resolving...'; el.ens.className='ens';
  await new Promise(r => setTimeout(r, 200));
  try {
    if(/^0x[a-fA-F0-9]{40}$/.test(input)){
      S.resolved = input; S.resolvedName = null;
      el.ens.textContent = 'Valid address'; el.ens.className='ens ok';
      updateSummary();
      return true;
    }
    if(input.includes('.')){
      S.resolved = '0xd0ec' + 'd0ec'.repeat(9);
      S.resolvedName = input;
      el.ens.textContent = `Resolved to: ${shortAddr(S.resolved)}`;
      el.ens.className='ens ok';
      updateSummary();
      return true;
    }
    el.ens.textContent='Invalid address or name';
    el.ens.className='ens err';
    return false;
  } finally {
    S.resolving = false;
    el.confirmBtn.disabled = false;
  }
};
const _simulate = async (msg, doneMsg, fn) => {
  showLoad(msg);
  await new Promise(r => setTimeout(r, 700));
  showLoad('Confirming...');
  await new Promise(r => setTimeout(r, 1000));
  hideLoad();
  toast(doneMsg, 5000);
  if(fn) fn();
};
deposit = async () => {
  await _simulate('Creating time-locked transfer...', 'Sent! Funds locked in SLOW.', () => {
    if(S.token && S.amount && S.delay && S.resolved){
      const t = mtx(S.symbol || 'TKN', S.amount, S.delay,
                    Date.now()/1000|0, PERSONAS[mockPersona].address, S.resolved,
                    {tipped: S.autoClaim});
      t.token = S.token;
      PERSONAS[mockPersona].out.push(t);
    }
    setView('home');
  });
};
claim = async (t) => {
  await _simulate('Claiming...', 'Claimed!', () => {
    PERSONAS[mockPersona].inb = PERSONAS[mockPersona].inb.filter(x => x.id !== t.id);
    loadTransfers();
  });
};
clawback = async (t) => {
  await _simulate('Recovering...', 'Recovered!', () => {
    PERSONAS[mockPersona].out = PERSONAS[mockPersona].out.filter(x => x.id !== t.id);
  });
  if(t.tipped) await _simulate('Refunding tip...', 'Tip refunded!', () => {});
  loadTransfers();
};
reverseAndWithdraw = async (t) => {
  await _simulate('Reversing transfer...', 'Reversed and returned!', () => {
    PERSONAS[mockPersona].out = PERSONAS[mockPersona].out.filter(x => x.id !== t.id);
  });
  if(t.tipped) await _simulate('Refunding tip...', 'Tip refunded!', () => {});
  loadTransfers();
};
el.approveBtn.onclick = async () => {
  const tok = S.token;
  await _simulate('Approving...', 'Approved!', () => {
    _approved.add(tok.toLowerCase());
    hideModal(el.approveModal);
    deposit();
  });
};

const personaSelect = $('personaSelect');
const personaDesc = $('personaDesc');
const updateDesc = () => { personaDesc.textContent = PERSONAS[mockPersona].desc; };
personaSelect.value = mockPersona;
updateDesc();
personaSelect.onchange = async () => {
  hideAllModals();
  if(S.view === 'send') resetForm();
  mockPersona = personaSelect.value;
  updateDesc();
  await connect();
  const p = PERSONAS[mockPersona];
  if(p.out.length) S.tab = 'outbound';
  else if(p.inb.length) S.tab = 'inbound';
  else S.tab = 'outbound';
  el.tabs.querySelectorAll('.tab').forEach(x => x.classList.toggle('on', x.dataset.tab === S.tab));
  if(S.view !== 'take') setView('take');
  loadTransfers();
};

render();
connect().then(() => { setView('take'); loadTransfers(); });
})();
</script>
</body>
</html>
